<!DOCTYPE html>
<html>
<head>
<title>UGHS Organisation Result</title>
</head>
<body style="text-align:center; font-family:Arial;">

<h2>UGHS Organisation Examination 2025/2026</h2>
<p>District: Gajapati</p>
<p>Centre Code: 099882</p>

<h3>Enter Roll Number</h3>
<input type="text" id="roll">
<button onclick="search()">Search</button>

<div id="result"></div>

<script>

var students = {
"20019": {name:"MUNA SABAR", total:140},
"20020": {name:"SUKUMANI SABAR", total:136},
"20021": {name:"LAXMINARAYAN SABAR", total:145}
};

function search(){
var roll = document.getElementById("roll").value;
if(students[roll]){
document.getElementById("result").innerHTML =
"<h3>Name: "+students[roll].name+
"<br>Total: "+students[roll].total+"/200<br>Result: PASS</h3>";
}
else{
document.getElementById("result").innerHTML =
"<h3 style='color:red;'>Roll Not Found</h3>";
}
}

</script>

</body>
</html>
