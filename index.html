<!DOCTYPE html>
<html>
<head>
<title>UGHS Organisation Examination</title>

<style>
body{
font-family:Arial;
background:#f0f5ff;
text-align:center;
}

.container{
background:white;
width:90%;
margin:auto;
margin-top:20px;
padding:20px;
border:4px solid #000080;
}

input{
padding:8px;
width:220px;
}

button{
padding:8px 15px;
background:#000080;
color:white;
border:none;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid black;
padding:8px;
}

th{
background:#e6e6ff;
}
</style>

</head>

<body>

<div class="container">

<h2>UGHS Organisation Examination 2025/2026</h2>

<p>District : Gajapati</p>
<p>Centre Code : 099882</p>

<h3>Enter Roll Number</h3>

<input type="text" id="rollInput" placeholder="Roll Number">
<br><br>

<button onclick="searchResult()">Search Result</button>

<div id="result"></div>

</div>

<script>

/* ⭐ Sample Student Database */

var students={

"20019":{name:"MUNA SABAR",gk:45,english:40,math:35},
"20020":{name:"SUKUMANI SABAR",gk:44,english:38,math:36},
"20021":{name:"LAXMINARAYAN SABAR",gk:46,english:42,math:38},
"20023":{name:"SANTUNU SABAR",gk:43,english:39,math:36},
"20024":{name:"ESWAR SABARA",gk:42,english:38,math:35},
"20025":{name:"KAINA RAIKA",gk:40,english:36,math:34},
"20026":{name:"PRASANTA SABAR",gk:48,english:44,math:40},
"20027":{name:"CHAKRA SABAR",gk:41,english:37,math:34},
"20028":{name:"SUDHAKAR SABAR",gk:49,english:45,math:42},
"20029":{name:"LOKANATH SABAR",gk:44,english:40,math:36},
"20030":{name:"RAMAKANTA SABAR",gk:45,english:41,math:38},
"20031":{name:"MANOJ SANAPATTA BHUYAN",gk:50,english:45,math:42},
"20032":{name:"JAYA DEV SABAR",gk:42,english:38,math:36},
"20033":{name:"NABINA SABAR",gk:40,english:36,math:34},
"20034":{name:"DEBENDRA BHUYAN",gk:46,english:42,math:38},
"20035":{name:"PRAMILA SABAR",gk:43,english:39,math:36},
"20036":{name:"KAILASH CHANDRA SABAR",gk:50,english:45,math:40},
"20037":{name:"SUNITA SABAR",gk:42,english:38,math:35},
"20038":{name:"RAIBATI GAMANGO",gk:40,english:36,math:34},
"20039":{name:"GOPAL SABAR",gk:48,english:44,math:40},
"20040":{name:"SUKANTA KUMAR SABAR",gk:47,english:43,math:38},
"20041":{name:"BIDYA DHARA SABAR",gk:50,english:46,math:42},
"20042":{name:"PRADEEP NAYAK",gk:44,english:40,math:36},
"20043":{name:"SOMONATH BADO RAITA",gk:42,english:38,math:34},
"20044":{name:"SIBARAM SABAR",gk:46,english:42,math:38},

"20050":{name:"SARATA SABAR",gk:41,english:37,math:33},
"20051":{name:"DILLESWARA RAUTO",gk:45,english:41,math:36}

};

/* ⭐ Search Function */

function searchResult(){

var roll=document.getElementById("rollInput").value.trim();

var s=students[roll];

if(s){

var total=s.gk+s.english+s.math;
var percent=(total/200)*100;

var division="Third Division";

if(percent>=60) division="First Division";
else if(percent>=45) division="Second Division";

document.getElementById("result").innerHTML=`

<hr>

<h3>${s.name}</h3>

<table>

<tr><th>Subject</th><th>Marks</th></tr>
<tr><td>GK</td><td>${s.gk}</td></tr>
<tr><td>English</td><td>${s.english}</td></tr>
<tr><td>Math</td><td>${s.math}</td></tr>

<tr><th>Total</th><th>${total}/200</th></tr>
<tr><th>Percentage</th><th>${percent.toFixed(2)}%</th></tr>
<tr><th>Division</th><th>${division}</th></tr>
<tr><th>Result</th><th style="color:green">PASS</th></tr>

</table>

<button onclick="window.print()" style="margin-top:20px;padding:10px 20px;background:green;color:white;border:none;">Print Result</button>

`;

}else{

document.getElementById("result").innerHTML=
"<h3 style='color:red'>Roll Number Not Found</h3>";

}

}

</script>

</body>
</html>
