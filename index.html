<!DOCTYPE html>
<html>
<head>
<title>UGHS Examination Result</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:#f2f2f2;
}

.box{
    background:white;
    padding:25px;
    width:350px;
    margin:40px auto;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

input{
    padding:10px;
    width:80%;
}

button{
    padding:10px 18px;
    margin-top:12px;
}

#result{
    margin-top:20px;
    text-align:left;
}
</style>
</head>

<body>

<h2>UGHS Examination 2026 Result</h2>

<div class="box">

<h3>Enter Roll Number</h3>

<input type="text" id="rollInput" placeholder="Enter Roll Number">

<br>

<button onclick="checkResult()">View Result</button>

<div id="result"></div>

</div>

<script>

var students = {
"2344":{
name:"Aditya Kumar",
centre:"Koinpur",
marks:140,
total:200,
result:"Pass"
},

"2345":{
name:"Priyanka Sabar",
centre:"Koinpur",
marks:78,
total:200,
result:"Pass"
},

"2336":{
name:"Priya Paik",
centre:"Koinpur",
marks:78,
total:200,
result:"Pass"
}
};

function checkResult(){
var roll = document.getElementById("rollInput").value;
var output = document.getElementById("result");

if(students[roll]){
var s = students[roll];

output.innerHTML =
"<hr>"+
"<b>Name:</b> "+s.name+"<br>"+
"<b>Centre:</b> "+s.centre+"<br>"+
"<b>Total Marks:</b> "+s.total+"<br>"+
"<b>Obtained Marks:</b> "+s.marks+"<br>"+
"<b>Result:</b> "+s.result;
}
else{
output.innerHTML="<b style='color:red'>Roll Number Not Found</b>";
}
}
</script>

</body>
</html>
