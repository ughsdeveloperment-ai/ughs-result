<!DOCTYPE html>
<html>
<head>
<title>Result Portal</title>
</head>

<body style="font-family:Arial;text-align:center;">

<h2>UGHS Organisation Examination 2025/2026</h2>

<input type="text" id="rollInput" placeholder="Enter Roll Number">
<button onclick="searchResult()">Search</button>

<div id="result" style="margin-top:20px;"></div>

<script>

var students = {

"E-2320025":{name:"UMACHARAN MANDAL",total:118},
"E-2320026":{name:"MIKHA SABAR",total:126},
"E-2320028":{name:"PURNA CHANDRA SABAR",total:120},
"E-2320030":{name:"DEBARAJ GAMANGO",total:123},
"E-2320031":{name:"MAMITA GAMANGO",total:124},
"E-2320032":{name:"SANJAYA KUMAR MANDAL",total:132},
"E-2320033":{name:"SHANKU SABAR",total:115},
"E-2320034":{name:"SANJEEBA MANDAL",total:129},
"E-2320035":{name:"STIPHEN GAMANGO",total:135},
"E-2320037":{name:"JAGANNATH GAMANGO",total:138}

};

function searchResult(){

var roll = document.getElementById("rollInput").value.trim().toUpperCase();

if(!roll.startsWith("E-")){
roll = "E-" + roll;
}

if(students[roll]){

document.getElementById("result").innerHTML =

"<h3>Result Published</h3>" +
"<p><b>Name:</b> " + students[roll].name + "</p>" +
"<p><b>Roll Number:</b> " + roll + "</p>" +
"<p><b>Total Marks:</b> " + students[roll].total + "/200</p>" +
"<p style='color:green;'><b>Status:</b> PASS</p>";

}else{

document.getElementById("result").innerHTML =
"<p style='color:red;'><b>Result Not Found</b></p>";

}

}

</script>

</body>
</html>
