<!DOCTYPE html>
<html>
<head>
<title>UGHS Organisation Examination 2025/2026</title>

<style>
body{
font-family: Arial, sans-serif;
background:#f0f5ff;
text-align:center;
}

.container{
background:white;
width:90%;
margin:auto;
margin-top:20px;
padding:20px;
border:4px solid #000080;
}

.header{
border-bottom:3px solid black;
padding-bottom:10px;
}

.logo{
font-size:22px;
font-weight:bold;
color:#000080;
}

h2{
margin:5px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border:1px solid black;
padding:8px;
}

th{
background:#e6e6ff;
}

input{
padding:8px;
width:220px;
}

button{
padding:8px 15px;
background:#000080;
color:white;
border:none;
cursor:pointer;
margin:5px;
}

.print-btn{
background:green;
}

.signature{
margin-top:40px;
text-align:right;
padding-right:50px;
}

.signature-name{
font-family:cursive;
font-size:26px;
color:#000080;
}

.seal{
margin-top:20px;
font-size:18px;
color:red;
font-weight:bold;
border:2px solid red;
display:inline-block;
padding:8px 20px;
border-radius:50px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="logo">UGHS ORGANISATION</div>
<h2>Examination 2025/2026</h2>
<p><b>District:</b> Gajapati</p>
<p><b>Centre Code:</b> 099882</p>
</div>

<h3>Result Search</h3>

<input type="text" id="roll" placeholder="Enter Roll Number">
<button onclick="search()">Search</button>

<div id="result"></div>

</div>

<script>

var students = {

"20019": {name:"MUNA SABAR", gk:70, english:65, math:60},
"20020": {name:"SUKUMANI SABAR", gk:68, english:66, math:62},
"20021": {name:"LAXMINARAYAN SABAR", gk:75, english:70, math:65},
"20023": {name:"SANTUNU SABAR", gk:72, english:68, math:64},
"20024": {name:"ESWAR SABARA", gk:71, english:69, math:63}

};

function search(){

var roll = document.getElementById("roll").value;
var s = students[roll];

if(s){

var total = s.gk + s.english + s.math;
var percent = (total/200)*100;

var division="";

if(percent >= 60){
division="First Division";
}
else if(percent >= 45){
division="Second Division";
}
else{
division="Third Division";
}

document.getElementById("result").innerHTML = `
<hr>
<h3>Student Name: ${s.name}</h3>
<p><b>Roll Number:</b> ${roll}</p>

<table>
<tr><th>Subject</th><th>Marks</th></tr>
<tr><td>General Knowledge</td><td>${s.gk}</td></tr>
<tr><td>English</td><td>${s.english}</td></tr>
<tr><td>Mathematics</td><td>${s.math}</td></tr>
<tr><th>Total</th><th>${total}/200</th></tr>
<tr><th>Percentage</th><th>${percent.toFixed(2)}%</th></tr>
<tr><th>Division</th><th>${division}</th></tr>
<tr><th>Result</th><th>PASS</th></tr>
</table>

<div class="seal">OFFICIAL RESULT - ODISHA</div>

<div class="signature">
<div class="signature-name">A. K. Development</div>
<div>Controller of Examination</div>
<div>UGHS Organisation</div>
</div>

<button class="print-btn" onclick="window.print()">Print Result</button>
`;
}
else{
document.getElementById("result").innerHTML =
"<h3 style='color:red;'>Roll Number Not Found</h3>";
}

}

</script>

</body>
</html>
