<head>

<style>

}

}

    padding:8px;

    margin:10px;
}

</head>
<body>

<div class="container">

<h2>UGHS Organisation Examination 2025/2026</h2>

<p><b>District:</b> Gajapati</p>
<p><b>Centre Code:</b> 099882</p>

<h3>Enter Roll Number to Check Result</h3>
<input type="text" id="rollInput" placeholder="Enter Roll Number">
<button onclick="showResult()">Search</button>

<div id="result"></div>

</div>

<script>

var students = {

function showResult(){

var roll = document.getElementById("rollInput").value.trim();
var s = students[roll];

if(s){

var total = s.gk + s.english + s.math;
var percent = (total/200)*100;

// Division logic
var division="";
if(percent>=60){
division="First Division";
}else if(percent>=45){
division="Second Division";
}else{
division="Third Division";
}

document.getElementById("result").innerHTML = `

<hr>

<h3><b>Student Name:</b> ${s.name}</h3>
<p><b>Roll Number:</b> ${roll}</p>

<table>
<tr><th>Subject</th><th>Marks</th></tr>
<tr><td>General Knowledge</td><td>${s.gk}</td></tr>
<tr><td>English</td><td>${s.english}</td></tr>
<tr><td>Mathematics</td><td>${s.math}</td></tr>

<tr><th>Total</th><th>${total}/200</th></tr>
<tr><th>Percentage</th><th>${percent.toFixed(2)}%</th></tr>
<tr><th>Division</th><th>${division}</th></tr>
<tr><th>Result</th><th style="color:green;">PASS</th></tr>
</table>

<button class="print-btn" onclick="window.print()">Print Result</button>

<br><br>
<b>Debendra Kumar</b><br>
Controller of Examination<br>
UGHS Organisation
</div>

`;
}else{
document.getElementById("result").innerHTML = "<h3 style='color:red;'>Roll Number Not Found</h3>";
}

}

</script>

</body>
</html>
