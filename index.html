<!DOCTYPE html>
<html>
<head>
<title>UGHS Organisation Examination 2025/2026</title>

<style>
body{
font-family:Arial, sans-serif;
background:#f0f5ff;
text-align:center;
}

.container{
background:white;
width:90%;
margin:auto;
margin-top:20px;
padding:20px;
border:4px solid #000080;
}

input{
padding:8px;
width:220px;
}

button{
padding:8px 15px;
background:#000080;
color:white;
border:none;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border:1px solid black;
padding:8px;
}

th{
background:#e6e6ff;
}

.header{
border-bottom:2px solid black;
margin-bottom:10px;
padding-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>UGHS Organisation Examination 2025/2026</h2>

<h3>Result Search</h3>

<input type="text" id="rollInput" placeholder="Enter Roll Number">
<br><br>

<button onclick="searchResult()">Search</button>

<div id="result"></div>

</div>

<script>

/* ✅ ALL STUDENTS DATABASE */

var students={

"E-2320025":{name:"UMACHARAN MANDAL",gk:43,english:39,math:36},
"E-2320026":{name:"MIKHA SABAR",gk:46,english:42,math:38},
"E-2320028":{name:"PURNA CHANDRA SABAR",gk:44,english:40,math:36},
"E-2320030":{name:"DEBARAJ GAMANGO",gk:45,english:41,math:37},
"E-2320031":{name:"MAMITA GAMANGO",gk:46,english:42,math:38},
"E-2320032":{name:"SANJAYA KUMAR MANDAL",gk:48,english:44,math:40},
"E-2320033":{name:"SHANKU SABAR",gk:42,english:38,math:35},
"E-2320034":{name:"SANJEEBA MANDAL",gk:47,english:43,math:39},
"E-2320035":{name:"STIPHEN GAMANGO",gk:49,english:45,math:41},
"E-2320037":{name:"JAGANNATH GAMANGO",gk:50,english:46,math:42}

};

/* ✅ SEARCH FUNCTION */

function searchResult(){

var roll=document.getElementById("rollInput").value.trim().toUpperCase();

if(!students.hasOwnProperty(roll)){
document.getElementById("result").innerHTML=
"<h3 style='color:red'>Roll Number Not Found</h3>";
return;
}

var s=students[roll];

var total=s.gk+s.english+s.math;
var percent=(total/200)*100;

var division="Third Division";
if(percent>=60) division="First Division";
else if(percent>=45) division="Second Division";

document.getElementById("result").innerHTML=`

<div class="header">
<h3>UGHS ORGANISATION</h3>
<p><b>District:</b> Gajapati</p>
<p><b>Centre Code:</b> 099882</p>
</div>

<h3>Student Name: ${s.name}</h3>
<p><b>Roll Number:</b> ${roll}</p>

<table>
<tr><th>Subject</th><th>Marks</th></tr>
<tr><td>General Knowledge</td><td>${s.gk}</td></tr>
<tr><td>English</td><td>${s.english}</td></tr>
<tr><td>Mathematics</td><td>${s.math}</td></tr>
<tr><th>Total</th><th>${total}/200</th></tr>
<tr><th>Percentage</th><th>${percent.toFixed(2)}%</th></tr>
<tr><th>Division</th><th>${division}</th></tr>
<tr><th>Result</th><th style="color:green">PASS</th></tr>
</table>

<br>
<button onclick="window.print()" style="padding:10px 20px;background:green;color:white;border:none;">Print Result</button>

`;

}

</script>

</body>
</html>
